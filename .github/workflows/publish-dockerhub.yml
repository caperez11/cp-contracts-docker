name: Publish Docker image

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: dockerhub-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/cp-contracts-docker

jobs:
  test-and-publish:
    name: Test and publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.8.0

      - name: Configure Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: traceability-contracts/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: traceability-contracts
        run: pnpm install --frozen-lockfile

      - name: Build, typecheck and test
        working-directory: traceability-contracts
        run: |
          pnpm build
          pnpm typecheck
          pnpm test

      - name: Read image version
        id: version
        working-directory: traceability-contracts
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "immutable_tag=${VERSION}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        id: publish
        uses: docker/build-push-action@v6
        with:
          context: ./traceability-contracts
          file: ./traceability-contracts/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.immutable_tag }}
          labels: |
            org.opencontainers.image.title=Logistics Certification
            org.opencontainers.image.description=Hardhat project for certifying logistics event hashes
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Write publication summary
        shell: bash
        run: |
          {
            echo "## Docker Hub publication"
            echo
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Image | \`${IMAGE_NAME}\` |"
            echo "| Version | \`${{ steps.version.outputs.version }}\` |"
            echo "| Commit | \`${GITHUB_SHA}\` |"
            echo "| Digest | \`${{ steps.publish.outputs.digest }}\` |"
            echo
            echo "Published tags:"
            echo
            echo "- \`${IMAGE_NAME}:latest\`"
            echo "- \`${IMAGE_NAME}:${{ steps.version.outputs.version }}\`"
            echo "- \`${IMAGE_NAME}:${{ steps.version.outputs.immutable_tag }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
