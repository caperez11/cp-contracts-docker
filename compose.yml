services:
  ganache:
    image: trufflesuite/ganache:v7.9.2
    container_name: logistics-ganache
    command:
      - --server.host=0.0.0.0
      - --server.port=8545
      - --chain.chainId=1337
      - --wallet.totalAccounts=10
      - --wallet.defaultBalance=1000
      - --wallet.mnemonic=test test test test test test test test test test test junk
      - --database.dbPath=/ganache_data
    ports:
      - "8545:8545"
    volumes:
      - ganache-data:/ganache_data

  hardhat-mainnet:
    container_name: logistics-hardhat-mainnet
    command: ["pnpm", "node:hardhat-mainnet"]
    ports:
      - "8546:8546"

  hardhat:
    container_name: logistics-hardhat
    environment:
      GANACHE_RPC_URL: http://ganache:8545
      HARDHAT_MAINNET_RPC_URL: http://hardhat-mainnet:8546
      GANACHE_PRIVATE_KEY: ${GANACHE_PRIVATE_KEY:-0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80}
      CONTRACT_ADDRESS: ${CONTRACT_ADDRESS:-}
    depends_on:
      - ganache
      - hardhat-mainnet
    command: ["sleep", "infinity"]

volumes:
  ganache-data:
